name: Build & Release APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compute version
        id: ver
        run: |
          # On a tag v1.2 -> versionName=1.2.
          # On main push -> dev build with a high versionCode so in-app self-update
          #   always treats the rolling 'latest' build as newer than any installed copy.
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VNAME="${GITHUB_REF#refs/tags/v}"
            # Strip non-numeric dots -> integer, e.g. v1.2 -> 12; fallback to run number.
            VCODE_NUM="${VNAME//./}"
            [[ "$VCODE_NUM" =~ ^[0-9]+$ ]] || VCODE_NUM="$GITHUB_RUN_NUMBER"
            VCODE="$VCODE_NUM"
          else
            VNAME="dev-${GITHUB_SHA::7}"
            # Base 900000 + run number keeps dev builds above any released 1.x/2.x
            # while staying below the 32-bit int ceiling (max ~2147483647).
            VCODE="$((900000 + GITHUB_RUN_NUMBER))"
          fi
          echo "version_name=$VNAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VCODE" >> "$GITHUB_OUTPUT"
          echo "Resolved versionName=$VNAME versionCode=$VCODE"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Decode the release keystore (stored as base64 in repo secrets) to a temp
      # file. The gradle build reads it via KEYSTORE_PATH. Skipping this step
      # makes the build fall back to debug signing — useful for PR builds, but
      # the published "latest" / tagged releases MUST run with the secret set,
      # otherwise existing installs can't be updated (signature mismatch).
      - name: Decode release keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      - name: Build release APK
        env:
          VERSION_CODE: ${{ steps.ver.outputs.version_code }}
          VERSION_NAME: ${{ steps.ver.outputs.version_name }}
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew :app:assembleRelease --no-daemon \
            -PversionCode="$VERSION_CODE" -PversionName="$VERSION_NAME"

      - name: Prepare artifacts
        env:
          VERSION_NAME: ${{ steps.ver.outputs.version_name }}
          VERSION_CODE: ${{ steps.ver.outputs.version_code }}
        run: |
          mkdir -p output
          APK_NAME="rustore-updater-${VERSION_NAME}.apk"
          cp app/build/outputs/apk/release/app-release.apk "output/${APK_NAME}"

          # Manifest consumed by the in-app self-updater.
          APK_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/latest/${APK_NAME}"
          APK_SIZE=$(stat -c%s "output/${APK_NAME}")
          cat > output/update.json <<EOF
          {
            "versionCode": ${VERSION_CODE},
            "versionName": "${VERSION_NAME}",
            "apkUrl": "${APK_URL}",
            "apkSizeBytes": ${APK_SIZE},
            "releaseNotes": "Автоматическая сборка ${VERSION_NAME}"
          }
          EOF
          echo "--- update.json ---"; cat output/update.json

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustore-updater-apk
          path: output/*
          retention-days: 30
          compression-level: 0

      # Обновляемый pre-release «latest» — стабильная публичная ссылка для скачивания
      # и источник update.json для самообновления приложения.
      - name: Update latest pre-release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_NAME: ${{ steps.ver.outputs.version_name }}
        run: |
          APK_NAME="rustore-updater-${VERSION_NAME}.apk"
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest \
            "output/${APK_NAME}" \
            "output/update.json" \
            --title "🚀 Latest Build" \
            --notes "Автоматическая сборка из коммита \`${GITHUB_SHA::7}\` от $(date -u +'%Y-%m-%d %H:%M UTC')." \
            --prerelease

      # Полноценный Release по тегу v*
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_NAME: ${{ steps.ver.outputs.version_name }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          APK_NAME="rustore-updater-${VERSION_NAME}.apk"
          gh release create "$TAG" \
            "output/${APK_NAME}" \
            "output/update.json" \
            --title "$TAG" \
            --generate-notes
