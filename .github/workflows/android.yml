name: Build & Release APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Prepare APK
        run: |
          mkdir -p output
          cp app/build/outputs/apk/debug/app-debug.apk \
             output/rustore-updater-$(date -u +'%Y%m%d')-${GITHUB_SHA::7}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustore-updater-apk
          path: output/*.apk
          retention-days: 30
          compression-level: 0

      # Обновляемый pre-release «latest» — стабильная публичная ссылка для скачивания
      - name: Update latest pre-release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest output/*.apk \
            --title "🚀 Latest Build" \
            --notes "Автоматическая сборка из коммита \`${GITHUB_SHA::7}\` от $(date -u +'%Y-%m-%d %H:%M UTC')." \
            --prerelease

      # Полноценный Release по тегу v*
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          gh release create "$TAG" output/*.apk \
            --title "$TAG" \
            --generate-notes
